<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --a: #58a6ff;
    --b: #3fb950;
    --c: #d29922;
    --d: #f78166;
    --e: #bc8cff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 2.2rem 3rem 1.4rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 0.35rem;
  }

  .header-left h1 em { font-style: italic; color: var(--text-muted); }

  .header-left p {
    font-size: 0.8rem;
    color: var(--text-muted);
    max-width: 500px;
    line-height: 1.6;
  }

  .stats-row { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }

  .stat { text-align: center; min-width: 64px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1; margin-bottom: 0.15rem; }
  .stat-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

  .controls {
    padding: 0.85rem 3rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    background: var(--surface);
  }

  .controls-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); font-weight: 600;
  }

  .filter-group { display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center; }
  .filter-group + .filter-group { padding-left: 1.2rem; border-left: 1px solid var(--border); }

  .btn {
    padding: 0.28rem 0.7rem; border-radius: 3px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.73rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.01em;
  }
  .btn:hover { border-color: #555; color: var(--text); }
  .btn.act-all  { border-color: var(--text);  color: var(--text);  background: rgba(255,255,255,0.07); }
  .btn.act-a    { border-color: var(--a);     color: var(--a);     background: rgba(88,166,255,0.13); }
  .btn.act-b    { border-color: var(--b);     color: var(--b);     background: rgba(63,185,80,0.13); }
  .btn.act-c    { border-color: var(--c);     color: var(--c);     background: rgba(210,153,34,0.13); }
  .btn.act-d    { border-color: var(--d);     color: var(--d);     background: rgba(247,129,102,0.13); }
  .btn.act-e    { border-color: var(--e);     color: var(--e);     background: rgba(188,140,255,0.13); }
  .btn.act-split{ border-color: #ff7b72;      color: #ff7b72;      background: rgba(255,123,114,0.13); }
  .btn.act-merge{ border-color: #79c0ff;      color: #79c0ff;      background: rgba(121,192,255,0.13); }

  .legend { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.7rem; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .chart-wrapper {
    padding: 1rem 0 2rem;
    overflow: auto;
    max-height: calc(100vh - 200px);
  }

  svg { display: block; }

  .tooltip {
    position: fixed; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 0.9rem; font-size: 0.77rem; line-height: 1.55;
    pointer-events: none; opacity: 0; transition: opacity 0.12s ease;
    max-width: 290px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.55);
  }
  .tooltip.show { opacity: 1; }
  .tt-title { font-weight: 600; color: var(--text); margin-bottom: 0.25rem; font-size: 0.8rem; }
  .tt-body  { color: var(--text-muted); }
  .tt-tag   {
    display: inline-block; margin-top: 0.35rem; padding: 0.1rem 0.4rem;
    border-radius: 2px; font-size: 0.66rem; font-family: 'DM Mono', monospace;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .tag-s { background: rgba(255,123,114,0.2); color: #ff7b72; }
  .tag-m { background: rgba(121,192,255,0.2); color: #79c0ff; }
</style>

const MB       = 30;

const totalH = Math.max(V1.length, V2.length) * PITCH + MT + MB;
const totalW = ML + COL_W + MID_GAP + COL_W + MR;

// Node y-positions (top of each bar)
const v1Y = {}, v2Y = {};
V1.forEach((n,i) => v1Y[n.id] = MT + i*PITCH);
V2.forEach((n,i) => v2Y[n.id] = MT + i*PITCH);

// x positions
const xL = ML;              // left edge of V1 bar
const xR = ML + COL_W + MID_GAP; // left edge of V2 bar

// ─── Build link objects with vertical offset tracking ─────────────
// For each node, track how many links have already been drawn
// so we can stack them within the bar height

// Count outgoing offsets per V1 node, incoming per V2 node
const v1Used = {}, v2Used = {};
V1.forEach(n => v1Used[n.id] = 0);
V2.forEach(n => v2Used[n.id] = 0);

const linkObjects = LINKS.map(([sid,tid]) => {
  const sNode = V1.find(n=>n.id===sid);
  const tNode = V2.find(n=>n.id===tid);
  const sTotal = v1Out[sid];
  const tTotal = v2In[tid];
  // Allocate a horizontal slice within each bar
  const sSlice = NODE_H / sTotal;
  const tSlice = NODE_H / tTotal;
  const sy0 = v1Y[sid] + v1Used[sid] * sSlice;
  const ty0 = v2Y[tid] + v2Used[tid] * tSlice;
  v1Used[sid]++;
  v2Used[tid]++;
  return {
    sid, tid,
    sy0, sy1: sy0 + sSlice,
    ty0, ty1: ty0 + tSlice,
    strand: sNode.strand,
    sNode, tNode
  };
});

// ─── Draw ─────────────────────────────────────────────────────────
const svg = d3.select('#chart')
  .append('svg')
  .attr('width', totalW)
  .attr('height', totalH)
  .style('font-family', "'DM Sans', sans-serif");

// Column headers
svg.append('text')
  .attr('x', xL + COL_W/2)
  .attr('y', 18)
  .attr('text-anchor','middle')
  .attr('font-family','DM Serif Display, serif')
  .attr('font-size', 13)
  .attr('fill','#e6edf3')
  .text('Version 1  ·  83 concepts');

svg.append('text')
  .attr('x', xL + COL_W/2)
  .attr('y', 33)
  .attr('text-anchor','middle')
  .attr('font-size', 9.5)
  .attr('fill','#8b949e')
  .text('Original progressions');

svg.append('text')
  .attr('x', xR + COL_W/2)
  .attr('y', 18)
  .attr('text-anchor','middle')
  .attr('font-family','DM Serif Display, serif')
  .attr('font-size', 13)
  .attr('fill','#e6edf3')
  .text('Version 2  ·  38 concepts');

svg.append('text')
  .attr('x', xR + COL_W/2)
  .attr('y', 33)
  .attr('text-anchor','middle')
  .attr('font-size', 9.5)
  .attr('fill','#8b949e')
  .text('Consolidated progressions');

// ─── Links ────────────────────────────────────────────────────────
const tt = document.getElementById('tt');

function ttShow(e, html) {
  tt.innerHTML = html;
  tt.classList.add('show');
  ttMove(e);
}
function ttMove(e) {
  const x = e.clientX+14, y = e.clientY-10;
  const w = tt.offsetWidth, h = tt.offsetHeight;
  tt.style.left = (x+w > window.innerWidth ? x-w-28 : x)+'px';
  tt.style.top  = (y+h > window.innerHeight ? y-h : y)+'px';
}
function ttHide() { tt.classList.remove('show'); }

function bandPath(sy0, sy1, ty0, ty1) {
  const x0 = xL + COL_W;
  const x1 = xR;
  const cx = (x0 + x1) / 2;
  return `M${x0},${sy0} C${cx},${sy0} ${cx},${ty0} ${x1},${ty0}
          L${x1},${ty1} C${cx},${ty1} ${cx},${sy1} ${x0},${sy1} Z`;
}

const linkPaths = svg.append('g').attr('class','lnks')
  .selectAll('path')
  .data(linkObjects)
  .join('path')
  .attr('d', d => bandPath(d.sy0, d.sy1, d.ty0, d.ty1))
  .attr('fill', d => SC[d.strand])
  .attr('fill-opacity', 0.18)
  .attr('stroke', 'none')
  .style('cursor','pointer')
  .on('mouseover', function(event, d) {
    d3.select(this).attr('fill-opacity', 0.55);
    const isSplit = v1Out[d.sid] > 1;
    ttShow(event, `
      <div class="tt-title">${d.sNode.code} → ${d.tNode.code}</div>
      <div class="tt-body">
        <b>V1:</b> ${d.sNode.name}<br>
        <b>V2:</b> ${d.tNode.name}
      </div>
      <span class="tt-tag ${isSplit?'tag-s':'tag-m'}">${isSplit?'Split':'Merge'}</span>
    `);
  })
  .on('mousemove', ttMove)
  .on('mouseout', function(event, d) {
    d3.select(this).attr('fill-opacity', 0.18);
    ttHide();
  });

// ─── V1 bars + labels ─────────────────────────────────────────────
const v1Groups = svg.append('g')
  .selectAll('g')
  .data(V1)
  .join('g')
  .style('cursor','pointer');

v1Groups.append('rect')
  .attr('x', xL)
  .attr('y', d => v1Y[d.id])
  .attr('width', COL_W)
  .attr('height', NODE_H)
  .attr('fill', d => SC[d.strand])
  .attr('rx', 1)
  .on('mouseover', function(event, d) {
    const out = v1Out[d.id]||0;
    ttShow(event, `
      <div class="tt-title">${d.code} · ${d.name}</div>
      <div class="tt-body">Version 1 · Strand ${d.strand}</div>
      <span class="tt-tag ${out>1?'tag-s':'tag-m'}">${out>1?'Split → '+out+' V2 concepts':'Single mapping'}</span>
    `);
    // highlight connected paths
    linkPaths.attr('fill-opacity', l => l.sid===d.id ? 0.65 : 0.04);
  })
  .on('mousemove', ttMove)
  .on('mouseout', function() {
    linkPaths.attr('fill-opacity', 0.18);
    ttHide();
  });

// Code label left of bar
v1Groups.append('text')
  .attr('x', xL - 4)
  .attr('y', d => v1Y[d.id] + NODE_H/2)
  .attr('text-anchor','end')
  .attr('dominant-baseline','middle')
  .attr('font-family','DM Mono, monospace')
  .attr('font-size', 8)
  .attr('fill', d => SC[d.strand])
  .attr('fill-opacity', 0.9)
  .text(d => d.code);

// Short name label (truncated)
v1Groups.append('text')
  .attr('x', xL - 40)
  .attr('y', d => v1Y[d.id] + NODE_H/2)
  .attr('text-anchor','end')
  .attr('dominant-baseline','middle')
  .attr('font-size', 8)
  .attr('fill','#8b949e')
  .text(d => d.name.length > 28 ? d.name.slice(0,27)+'…' : d.name);

// ─── V2 bars + labels ─────────────────────────────────────────────
const v2Groups = svg.append('g')
  .selectAll('g')
  .data(V2)
  .join('g')
  .style('cursor','pointer');

v2Groups.append('rect')
  .attr('x', xR)
  .attr('y', d => v2Y[d.id])
  .attr('width', COL_W)
  .attr('height', NODE_H)
  .attr('fill', d => SC[d.strand])
  .attr('rx', 1)
  .on('mouseover', function(event, d) {
    const inp = v2In[d.id]||0;
    ttShow(event, `
      <div class="tt-title">${d.code} · ${d.name}</div>
      <div class="tt-body">Version 2 · Strand ${d.strand}</div>
      <span class="tt-tag ${inp>1?'tag-m':'tag-s'}">${inp>1?'Absorbs '+inp+' V1 concepts':'Single source'}</span>
    `);
    linkPaths.attr('fill-opacity', l => l.tid===d.id ? 0.65 : 0.04);
  })
  .on('mousemove', ttMove)
  .on('mouseout', function() {
    linkPaths.attr('fill-opacity', 0.18);
    ttHide();
  });

// Code label right of bar
v2Groups.append('text')
  .attr('x', xR + COL_W + 4)
  .attr('y', d => v2Y[d.id] + NODE_H/2)
  .attr('dominant-baseline','middle')
  .attr('font-family','DM Mono, monospace')
  .attr('font-size', 8)
  .attr('fill', d => SC[d.strand])
  .attr('fill-opacity', 0.9)
  .text(d => d.code);

// Full name
v2Groups.append('text')
  .attr('x', xR + COL_W + 40)
  .attr('y', d => v2Y[d.id] + NODE_H/2)
  .attr('dominant-baseline','middle')
  .attr('font-size', 8)
  .attr('fill','#c9d1d9')
  .text(d => d.name.length > 42 ? d.name.slice(0,41)+'…' : d.name);

// ─── Filters ──────────────────────────────────────────────────────
let fStrand = 'all', fPattern = 'all';

function applyFilter() {
  const visLinks = new Set();
  const visV1 = new Set(), visV2 = new Set();

  linkObjects.forEach((l,i) => {
    const stOk = fStrand==='all' || l.strand===fStrand;
    const isSplit = v1Out[l.sid]>1;
    const isMerge = v2In[l.tid]>1;
    const ptOk = fPattern==='all'
      || (fPattern==='splits' && isSplit)
      || (fPattern==='merges' && isMerge);
    if (stOk && ptOk) {
      visLinks.add(i);
      visV1.add(l.sid);
      visV2.add(l.tid);
    }
  });

  linkPaths.transition().duration(200)
    .attr('fill-opacity', (_,i) => visLinks.has(i) ? 0.22 : 0.03);

  v1Groups.selectAll('rect').transition().duration(200)
    .attr('opacity', d => visV1.has(d.id) ? 1 : 0.1);
  v1Groups.selectAll('text').transition().duration(200)
    .attr('opacity', d => visV1.has(d.id) ? 1 : 0.1);

  v2Groups.selectAll('rect').transition().duration(200)
    .attr('opacity', d => visV2.has(d.id) ? 1 : 0.1);
  v2Groups.selectAll('text').transition().duration(200)
    .attr('opacity', d => visV2.has(d.id) ? 1 : 0.1);
}

document.querySelectorAll('.btn[data-f]').forEach(btn => {
  btn.addEventListener('click', function() {
    const f = this.dataset.f;
    const c = this.dataset.c;
    const strandVals = ['all','A','B','C','D','E'];
    const patternVals = ['splits','merges'];

    if (strandVals.includes(f)) {
      document.querySelectorAll('.btn[data-f]').forEach(b => {
        if (strandVals.includes(b.dataset.f)) b.className = 'btn';
      });
      fStrand = f;
      this.classList.add(f==='all' ? 'act-all' : 'act-'+c);
    } else {
      document.querySelectorAll('.btn[data-f]').forEach(b => {
        if (patternVals.includes(b.dataset.f)) b.className = 'btn';
      });
      if (fPattern === f) {
        fPattern = 'all';
      } else {
        fPattern = f;
        this.classList.add('act-'+f);
      }
    }
    applyFilter();
  });
});
</script>
</body>
</html>
